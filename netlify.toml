[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    # Evita que o site seja embutido em iframes de outros domínios (clickjacking)
    X-Frame-Options = "DENY"
    # Impede que o browser "adivinhe" o tipo do arquivo (MIME sniffing)
    X-Content-Type-Options = "nosniff"
    # Força HTTPS para todas as requisições por 1 ano
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Controla quais informações de referência são enviadas
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permite apenas features necessárias no browser
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache longo para assets com hash no nome (Vite gera hashes automaticamente)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    # HTML nunca fica em cache para garantir atualizações imediatas
    Cache-Control = "public, max-age=0, must-revalidate"

# Redireciona todas as rotas para index.html (SPA fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
